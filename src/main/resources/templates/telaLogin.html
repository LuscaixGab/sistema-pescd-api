<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{login.title}">Login | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
<div th:replace="~{fragments/language-selector :: languageSelector}"></div>
<main class="login-shell">
    <section class="login-card" aria-labelledby="login-title">
        <div class="login-header">
            <p class="login-kicker" th:text="#{app.name}">PESCD</p>
            <h1 id="login-title" th:text="#{login.heading}">Acesse sua conta</h1>
            <p th:text="#{login.subtitle}">Use seu usuário ou e-mail para entrar no sistema.</p>
        </div>

        <div th:if="${mensagemErro}" class="login-message error" th:text="${mensagemErro}"></div>
        <div th:if="${mensagemLogout}" class="login-message success" th:text="${mensagemLogout}"></div>

        <form class="login-form" id="login-form" th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-group">
                <label for="nomeUsuario" th:text="#{login.username}">Usuário ou e-mail</label>
                <input
                        id="nomeUsuario"
                        name="nomeUsuario"
                        type="text"
                        placeholder="Digite seu usuário ou e-mail" th:placeholder="#{login.username.placeholder}"
                        autocomplete="username"
                        required>
            </div>

            <div class="form-group">
                <label for="senha" th:text="#{common.password}">Senha</label>
                <input
                        id="senha"
                        name="senha"
                        type="password"
                        placeholder="Digite sua senha" th:placeholder="#{login.password.placeholder}"
                        autocomplete="current-password"
                        required>
            </div>

            <button type="submit" th:text="#{login.submit}">Entrar</button>
        </form>

        <div id="login-feedback" class="login-message error" style="display:none;"></div>

        <p class="login-footer">
            <span th:text="#{login.visitorPrefix}">Acessar como</span>
            <a th:href="@{/ofertas-publicas}" th:text="#{login.visitor}">Visitante</a>
        </p>
    </section>
</main>
<script>
    const loginForm = document.getElementById('login-form');
    const loginFeedback = document.getElementById('login-feedback');

    loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        loginFeedback.style.display = 'none';
        loginFeedback.textContent = '';

        const payload = {
            nomeUsuario: document.getElementById('nomeUsuario').value.trim(),
            senha: document.getElementById('senha').value
        };

        try {
            const response = await fetch('/api/v1/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                credentials: 'include',
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (!response.ok) {
                loginFeedback.textContent = data.message || 'Falha ao autenticar.';
                loginFeedback.style.display = 'block';
                return;
            }

            window.location.href = data.redirectUrl || '/painel';
        } catch (error) {
            loginFeedback.textContent = 'Falha ao autenticar.';
            loginFeedback.style.display = 'block';
        }
    });
</script>
</body>
</html>
