<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{admin.users.title}">Usuarios | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
<div th:replace="~{fragments/language-selector :: languageSelector}"></div>
<main class="page-shell" th:attr="data-usuario-logado-id=${usuarioLogadoId}">
    <section class="page-card">
        <header class="page-header">
            <div>
                <p class="page-kicker" th:text="#{admin.kicker}">Administrador</p>
                <h1 th:text="#{admin.users.heading}">Gerenciamento de usuarios</h1>
                <p th:text="#{admin.users.subtitle}">Cadastre, edite e remova usuarios do sistema conforme o perfil de acesso.</p>
            </div>
            <div class="actions" style="gap: 0.5rem;">
                <a class="button-link" th:href="@{/administrador/usuarios/novo}" th:text="#{admin.users.new}">Novo usuario</a>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="button-link secondary" type="submit" th:text="#{common.logout}">Sair</button>
                </form>
            </div>
        </header>

        <div id="usuarios-feedback" class="notice" style="display:none;"></div>

        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th th:text="#{common.name}">Nome</th>
                    <th th:text="#{common.email}">Email</th>
                    <th th:text="#{common.user}">Usuario</th>
                    <th th:text="#{common.profile}">Perfil</th>
                    <th th:text="#{common.actions}">Acoes</th>
                </tr>
                </thead>
                <tbody id="usuarios-body">
                <tr>
                    <td colspan="5" class="empty-state">Carregando usuarios...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
<script>
    const usuariosBody = document.getElementById('usuarios-body');
    const feedback = document.getElementById('usuarios-feedback');
    const pageRoot = document.querySelector('[data-usuario-logado-id]');
    const usuarioLogadoId = pageRoot ? pageRoot.dataset.usuarioLogadoId : '';

    function showFeedback(message, type) {
        feedback.textContent = message;
        feedback.className = type === 'error' ? 'notice error' : 'notice success';
        feedback.style.display = 'block';
    }

    function clearFeedback() {
        feedback.textContent = '';
        feedback.style.display = 'none';
        feedback.className = 'notice';
    }

    function renderEmptyState(message) {
        usuariosBody.innerHTML = '';
        const row = document.createElement('tr');
        const cell = document.createElement('td');
        cell.colSpan = 5;
        cell.className = 'empty-state';
        cell.textContent = message;
        row.appendChild(cell);
        usuariosBody.appendChild(row);
    }

    function renderUsuarios(usuarios) {
        usuariosBody.innerHTML = '';

        if (!usuarios.length) {
            renderEmptyState('Nenhum usuario cadastrado ainda.');
            return;
        }

        usuarios.forEach((usuario) => {
            const row = document.createElement('tr');

            const nome = document.createElement('td');
            nome.textContent = usuario.nomeCompleto || '';
            row.appendChild(nome);

            const email = document.createElement('td');
            email.textContent = usuario.email || '';
            row.appendChild(email);

            const nomeUsuario = document.createElement('td');
            nomeUsuario.textContent = usuario.nomeUsuario || '';
            row.appendChild(nomeUsuario);

            const perfil = document.createElement('td');
            perfil.textContent = usuario.perfil || '';
            row.appendChild(perfil);

            const actions = document.createElement('td');
            const wrapper = document.createElement('div');
            wrapper.className = 'actions';
            wrapper.style.justifyContent = 'flex-start';
            wrapper.style.gap = '0.5rem';

            const editLink = document.createElement('a');
            editLink.className = 'button-link secondary btn-sm';
            editLink.textContent = 'Editar';
            editLink.href = `/administrador/usuarios/${usuario.id}/editar`;
            wrapper.appendChild(editLink);

            if (String(usuario.id) !== String(usuarioLogadoId)) {
                const deleteButton = document.createElement('button');
                deleteButton.type = 'button';
                deleteButton.className = 'button-link btn-sm js-delete-user';
                deleteButton.dataset.userId = usuario.id;
                deleteButton.style.border = 'none';
                deleteButton.textContent = 'Excluir';
                wrapper.appendChild(deleteButton);
            } else {
                const selfLabel = document.createElement('span');
                selfLabel.className = 'button-link secondary btn-sm';
                selfLabel.style.pointerEvents = 'none';
                selfLabel.style.opacity = '0.6';
                selfLabel.textContent = 'Voce';
                wrapper.appendChild(selfLabel);
            }

            actions.appendChild(wrapper);
            row.appendChild(actions);
            usuariosBody.appendChild(row);
        });
    }

    async function carregarUsuarios() {
        clearFeedback();
        renderEmptyState('Carregando usuarios...');

        try {
            const response = await fetch('/api/v1/usuarios', {
                headers: { Accept: 'application/json' },
                credentials: 'include'
            });

            const data = await response.json();

            if (!response.ok) {
                renderEmptyState('Nao foi possivel carregar os usuarios.');
                showFeedback(data.message || 'Falha ao carregar usuarios.', 'error');
                return;
            }

            renderUsuarios(data);
            const notice = sessionStorage.getItem('adminUsersNotice');
            if (notice) {
                sessionStorage.removeItem('adminUsersNotice');
                showFeedback(notice, 'success');
            }
        } catch (error) {
            renderEmptyState('Nao foi possivel carregar os usuarios.');
            showFeedback('Falha ao carregar usuarios.', 'error');
        }
    }

    usuariosBody.addEventListener('click', async (event) => {
        const target = event.target;
        if (!target.classList.contains('js-delete-user')) {
            return;
        }

        const userId = target.dataset.userId;
        if (!confirm('Excluir este usuario?')) {
            return;
        }

        try {
            const response = await fetch(`/api/v1/usuarios/${userId}`, {
                method: 'DELETE',
                headers: { Accept: 'application/json' },
                credentials: 'include'
            });

            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                showFeedback(data.message || 'Nao foi possivel excluir o usuario.', 'error');
                return;
            }

            sessionStorage.setItem('adminUsersNotice', 'Usuario excluido com sucesso.');
            await carregarUsuarios();
        } catch (error) {
            showFeedback('Nao foi possivel excluir o usuario.', 'error');
        }
    });

    document.addEventListener('DOMContentLoaded', carregarUsuarios);
</script>
</body>
</html>
