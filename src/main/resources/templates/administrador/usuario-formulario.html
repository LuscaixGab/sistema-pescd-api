<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tituloPagina}">Usuario | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
<div th:replace="~{fragments/language-selector :: languageSelector}"></div>
<main class="page-shell" th:attr="data-usuario-id=${usuarioId}">
    <section class="page-card">
        <header class="page-header">
            <div>
                <p class="page-kicker" th:text="#{admin.kicker}">Administrador</p>
                <h1 th:text="${tituloPagina}">Usuario</h1>
                <p th:text="#{admin.form.subtitle}">Preencha os dados abaixo para cadastrar ou atualizar o acesso.</p>
            </div>
            <div class="actions" style="gap: 0.5rem;">
                <a class="button-link secondary" th:href="@{/administrador/usuarios}" th:text="#{common.back}">Voltar</a>
                <form th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="button-link secondary" type="submit" th:text="#{common.logout}">Sair</button>
                </form>
            </div>
        </header>

        <div id="form-feedback" class="notice error" style="display:none;"></div>

        <form class="offer-form" id="usuario-form" th:action="@{${formAction}}" method="post" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" id="usuario-id" th:value="${usuarioId}">

            <div class="field-grid">
                <div class="field">
                    <label for="nomeCompleto" th:text="#{admin.form.fullName}">Nome completo *</label>
                    <input id="nomeCompleto" type="text" name="nomeCompleto" placeholder="Nome do usuario" th:placeholder="#{admin.form.fullName.placeholder}">
                    <small id="error-nomeCompleto" class="field-error" style="display:none;"></small>
                </div>

                <div class="field">
                    <label for="perfil" th:text="#{admin.form.profile}">Perfil *</label>
                    <select id="perfil" name="perfil">
                        <option value="" th:text="#{admin.form.selectProfile}">Selecione um perfil</option>
                        <option th:each="perfilItem : ${T(br.ufscar.dc.dsw.pescd.model.Perfil).values()}"
                                th:value="${perfilItem}"
                                th:text="${perfilItem}"></option>
                    </select>
                    <small id="error-perfil" class="field-error" style="display:none;"></small>
                </div>
            </div>

            <div class="field">
                <label for="email" th:text="#{admin.form.email}">E-mail *</label>
                <input id="email" type="email" name="email" placeholder="usuario@exemplo.com">
                <small id="error-email" class="field-error" style="display:none;"></small>
            </div>

            <div class="field">
                <label for="nomeUsuario" th:text="#{admin.form.username}">Nome de usuario *</label>
                <input id="nomeUsuario" type="text" name="nomeUsuario" placeholder="login de acesso" th:placeholder="#{admin.form.username.placeholder}">
                <small id="error-nomeUsuario" class="field-error" style="display:none;"></small>
            </div>

            <div class="field">
                <label for="senha" th:text="#{common.password}">Senha</label>
                <input id="senha" type="password" name="senha" placeholder="Digite uma nova senha" th:placeholder="#{admin.form.password.placeholder}">
                <small id="error-senha" class="field-error" style="display:none;"></small>
                <small class="muted" th:if="${usuarioId != null}" th:text="#{admin.form.keepPassword}">
                    Deixe em branco para manter a senha atual.
                </small>
                <small class="muted" th:if="${usuarioId == null}" th:text="#{admin.form.passwordRequired}">
                    Obrigatoria no cadastro.
                </small>
            </div>

            <div class="actions">
                <button type="submit" th:text="${botaoTexto}">Salvar</button>
            </div>
        </form>
    </section>
</main>
<script>
    const form = document.getElementById('usuario-form');
    const usuarioIdInput = document.getElementById('usuario-id');
    const usuarioId = usuarioIdInput ? usuarioIdInput.value.trim() : '';
    const feedback = document.getElementById('form-feedback');
    const campos = ['nomeCompleto', 'perfil', 'email', 'nomeUsuario', 'senha'];

    function clearFieldErrors() {
        campos.forEach((campo) => {
            const error = document.getElementById(`error-${campo}`);
            if (error) {
                error.textContent = '';
                error.style.display = 'none';
            }
        });
    }

    function setFieldError(campo, mensagem) {
        const error = document.getElementById(`error-${campo}`);
        if (error) {
            error.textContent = mensagem;
            error.style.display = 'block';
        }
    }

    function showFeedback(message) {
        feedback.textContent = message;
        feedback.style.display = 'block';
    }

    function clearFeedback() {
        feedback.textContent = '';
        feedback.style.display = 'none';
    }

    function preencherFormulario(usuario) {
        document.getElementById('nomeCompleto').value = usuario.nomeCompleto || '';
        document.getElementById('perfil').value = usuario.perfil || '';
        document.getElementById('email').value = usuario.email || '';
        document.getElementById('nomeUsuario').value = usuario.nomeUsuario || '';
        document.getElementById('senha').value = '';
    }

    async function carregarUsuario() {
        if (!usuarioId) {
            return;
        }

        try {
            const response = await fetch(`/api/v1/usuarios/${usuarioId}`, {
                headers: { Accept: 'application/json' },
                credentials: 'include'
            });

            const data = await response.json();
            if (!response.ok) {
                showFeedback(data.message || 'Nao foi possivel carregar o usuario.');
                return;
            }

            preencherFormulario(data);
        } catch (error) {
            showFeedback('Nao foi possivel carregar o usuario.');
        }
    }

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        clearFeedback();
        clearFieldErrors();

        const payload = {
            nomeCompleto: document.getElementById('nomeCompleto').value.trim(),
            perfil: document.getElementById('perfil').value,
            email: document.getElementById('email').value.trim(),
            nomeUsuario: document.getElementById('nomeUsuario').value.trim(),
            senha: document.getElementById('senha').value
        };

        const metodo = usuarioId ? 'PUT' : 'POST';
        const url = usuarioId ? `/api/v1/usuarios/${usuarioId}` : '/api/v1/usuarios';

        try {
            const response = await fetch(url, {
                method: metodo,
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                credentials: 'include',
                body: JSON.stringify(payload)
            });

            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                if (data.fieldErrors) {
                    Object.entries(data.fieldErrors).forEach(([campo, mensagem]) => setFieldError(campo, mensagem));
                }
                showFeedback(data.message || 'Falha ao salvar usuario.');
                return;
            }

            sessionStorage.setItem('adminUsersNotice', usuarioId ? 'Usuario atualizado com sucesso.' : 'Usuario criado com sucesso.');
            window.location.href = '/administrador/usuarios';
        } catch (error) {
            showFeedback('Falha ao salvar usuario.');
        }
    });

    document.addEventListener('DOMContentLoaded', carregarUsuario);
</script>
</body>
</html>
