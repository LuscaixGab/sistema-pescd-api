<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{student.plan.title}">Enviar plano de trabalho | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
<div th:replace="~{fragments/language-selector :: languageSelector}"></div>
<main class="page-shell">
    <section class="page-card">
        <header class="page-header">
            <div>
                <p class="page-kicker" th:text="#{common.student}">Aluno</p>
                <h1 th:text="#{student.plan.heading}">Enviar plano de trabalho</h1>
                <p th:text="#{student.plan.subtitle}">Preencha os dados da disciplina e anexe o arquivo do plano.</p>
            </div>
            <a class="button-link secondary" th:href="@{/aluno/ofertas}" th:text="#{common.back}">Voltar</a>
        </header>

        <div id="plano-feedback" class="notice error" style="display:none;"></div>
        <div th:if="${erroGeral}" class="notice error" th:text="${erroGeral}"></div>

        <form class="offer-form"
              id="plano-form"
              th:action="@{/aluno/plano-trabalho/adicionar}"
              th:object="${planoTrabalhoForm}"
              method="post"
              enctype="multipart/form-data">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{inscricaoId}">

            <div class="notice"
                 th:if="${inscricao != null}"
                 style="margin-top: 0;"
                 th:text="#{student.plan.notice(${inscricao.oferta.nomeOferta}, ${inscricao.oferta.semestre})}">
                Enviando plano para a matricula da oferta Nome da Oferta do semestre 2026/1.
            </div>

            <div class="field-grid">
                <div class="field">
                    <label for="codigoDisciplina" th:text="#{student.plan.code}">Codigo da disciplina *</label>
                    <input id="codigoDisciplina" type="text" th:field="*{codigoDisciplina}" placeholder="Ex.: CC1234" th:placeholder="#{student.plan.code.placeholder}">
                    <small id="error-codigoDisciplina" class="field-error" style="display:none;"></small>
                </div>

                <div class="field">
                    <label for="cursoDisciplina" th:text="#{student.plan.course}">Curso *</label>
                    <input id="cursoDisciplina" type="text" th:field="*{cursoDisciplina}" placeholder="Ex.: Ciencia da Computacao" th:placeholder="#{student.plan.course.placeholder}">
                    <small id="error-cursoDisciplina" class="field-error" style="display:none;"></small>
                </div>
            </div>

            <div class="field">
                <label for="nomeDisciplina" th:text="#{student.plan.name}">Nome da disciplina *</label>
                <input id="nomeDisciplina" type="text" th:field="*{nomeDisciplina}" placeholder="Nome completo da disciplina" th:placeholder="#{student.plan.name.placeholder}">
                <small id="error-nomeDisciplina" class="field-error" style="display:none;"></small>
            </div>

            <div class="field">
                <label for="professorSupervisorId" th:text="#{student.plan.supervisor}">Professor supervisor *</label>
                <select id="professorSupervisorId" th:field="*{professorSupervisorId}">
                    <option value="" th:text="#{common.selectProfessor}">Selecione um professor</option>
                    <option th:each="professor : ${professores}"
                            th:value="${professor.id}"
                            th:text="${professor.nomeCompleto + ' (' + professor.nomeUsuario + ')'}"></option>
                </select>
                <small id="error-professorSupervisorId" class="field-error" style="display:none;"></small>
            </div>

            <div class="field">
                <label for="arquivoPlano" th:text="#{student.plan.file}">Arquivo do plano * (Apenas PDF, max 5MB)</label>
                <input id="arquivoPlano" type="file" th:field="*{arquivoPlano}" accept=".pdf,application/pdf">
                <small id="error-arquivoPlano" class="field-error" style="display:none;"></small>
            </div>

            <small id="error-inscricaoId" class="field-error" style="display:none;"></small>

            <div class="actions">
                <button type="submit" th:text="#{student.plan.submit}">Enviar plano</button>
            </div>
        </form>
    </section>
</main>
<script>
    const planoForm = document.getElementById('plano-form');
    const planoFeedback = document.getElementById('plano-feedback');

    function clearFeedback() {
        planoFeedback.textContent = '';
        planoFeedback.style.display = 'none';
        planoFeedback.className = 'notice error';
    }

    function showFeedback(message, type) {
        planoFeedback.textContent = message;
        planoFeedback.className = type === 'success' ? 'notice success' : 'notice error';
        planoFeedback.style.display = 'block';
    }

    function clearFieldErrors() {
        document.querySelectorAll('.field-error').forEach((element) => {
            element.textContent = '';
            element.style.display = 'none';
        });
    }

    function setFieldError(field, message) {
        const target = document.getElementById(`error-${field}`);
        if (target) {
            target.textContent = message;
            target.style.display = 'block';
        }
    }

    planoForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        clearFeedback();
        clearFieldErrors();

        const formData = new FormData(planoForm);

        try {
            const response = await fetch('/api/v1/plano-trabalho', {
                method: 'POST',
                credentials: 'include',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            });

            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                if (data.fieldErrors) {
                    Object.entries(data.fieldErrors).forEach(([field, message]) => setFieldError(field, message));
                }
                showFeedback(data.message || 'Falha ao enviar o plano.', 'error');
                return;
            }

            window.location.href = '/painel';
        } catch (error) {
            showFeedback('Falha ao enviar o plano.', 'error');
        }
    });
</script>
</body>
</html>
