<!DOCTYPE html>
<html th:lang="${#locale.toLanguageTag()}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{offers.form.title}">Nova oferta | PESCD</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-page">
<div th:replace="~{fragments/language-selector :: languageSelector}"></div>
<main class="page-shell">
    <section class="page-card">
        <header class="page-header">
            <div>
                <p class="page-kicker" th:text="#{secretary.kicker}">Secretaria</p>
                <h1 th:text="#{panel.createOffer}">Criar oferta</h1>
                <p th:text="#{offers.form.subtitle}">Preencha os dados para iniciar o workflow do semestre.</p>
            </div>
            <a class="button-link secondary" th:href="@{/ofertas}" th:text="#{common.back}">Voltar</a>
        </header>

        <div id="oferta-feedback" class="notice error" style="display:none;"></div>
        <div th:if="${erroGeral}" class="notice error" th:text="${erroGeral}"></div>

        <form class="offer-form" id="oferta-form" th:action="@{/ofertas}" method="post" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="field">
                <label for="nomeOferta" th:text="#{offers.form.name}">Nome da oferta</label>
                <input id="nomeOferta" type="text" name="nomeOferta" placeholder="Opcional, sera gerado se vazio">
                <small id="error-nomeOferta" class="field-error" style="display:none;"></small>
            </div>

            <div class="field">
                <label for="semestre" th:text="#{offers.form.semester}">Semestre *</label>
                <input id="semestre" type="text" name="semestre" placeholder="Ex.: 2026-1">
                <small id="error-semestre" class="field-error" style="display:none;"></small>
            </div>

            <div class="field-grid">
                <div class="field">
                    <label for="dataInicio" th:text="#{offers.form.start}">Data de inicio *</label>
                    <input id="dataInicio" type="date" name="dataInicio">
                    <small id="error-dataInicio" class="field-error" style="display:none;"></small>
                </div>

                <div class="field">
                    <label for="dataFim" th:text="#{offers.form.end}">Data de fim *</label>
                    <input id="dataFim" type="date" name="dataFim">
                    <small id="error-dataFim" class="field-error" style="display:none;"></small>
                </div>
            </div>

            <div class="field">
                <label for="professorResponsavelId" th:text="#{offers.form.responsible}">Professor responsavel *</label>
                <select id="professorResponsavelId" name="professorResponsavelId">
                    <option value="" th:text="#{common.selectProfessor}">Selecione um professor</option>
                    <option th:each="professor : ${professores}"
                            th:value="${professor.id}"
                            th:text="${professor.nomeCompleto + ' (' + professor.nomeUsuario + ')'}"></option>
                </select>
                <small id="error-professorResponsavelId" class="field-error" style="display:none;"></small>
            </div>

            <div class="actions">
                <button type="submit" th:text="#{panel.createOffer}">Criar oferta</button>
            </div>
        </form>
    </section>
</main>
<script>
    const ofertaForm = document.getElementById('oferta-form');
    const ofertaFeedback = document.getElementById('oferta-feedback');

    function clearFeedback() {
        ofertaFeedback.textContent = '';
        ofertaFeedback.style.display = 'none';
        ofertaFeedback.className = 'notice error';
    }

    function showFeedback(message, type) {
        ofertaFeedback.textContent = message;
        ofertaFeedback.className = type === 'success' ? 'notice success' : 'notice error';
        ofertaFeedback.style.display = 'block';
    }

    function clearFieldErrors() {
        document.querySelectorAll('.field-error').forEach((element) => {
            element.textContent = '';
            element.style.display = 'none';
        });
    }

    function setFieldError(field, message) {
        const target = document.getElementById(`error-${field}`);
        if (target) {
            target.textContent = message;
            target.style.display = 'block';
        }
    }

    ofertaForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        clearFeedback();
        clearFieldErrors();

        const payload = {
            nomeOferta: document.getElementById('nomeOferta').value.trim(),
            semestre: document.getElementById('semestre').value.trim(),
            dataInicio: document.getElementById('dataInicio').value,
            dataFim: document.getElementById('dataFim').value,
            professorResponsavelId: document.getElementById('professorResponsavelId').value
        };

        try {
            const response = await fetch('/api/v1/ofertas', {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                if (data.fieldErrors) {
                    Object.entries(data.fieldErrors).forEach(([field, message]) => setFieldError(field, message));
                }
                showFeedback(data.message || 'Falha ao criar oferta.', 'error');
                return;
            }

            window.location.href = '/ofertas';
        } catch (error) {
            showFeedback('Falha ao criar oferta.', 'error');
        }
    });
</script>
</body>
</html>
